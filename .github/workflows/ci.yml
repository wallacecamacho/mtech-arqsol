name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Build
        run: dotnet build CashFlow.sln --no-restore --configuration Release

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Run unit tests
        run: |
          dotnet test CashFlow.sln \
            --no-restore \
            --configuration Release \
            --filter "FullyQualifiedName~UnitTests" \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./test-results/*.trx

  # ── Job 3: Integration Tests ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Run integration tests
        run: |
          dotnet test CashFlow.sln \
            --no-restore \
            --configuration Release \
            --filter "FullyQualifiedName~IntegrationTests" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results
        env:
          # Testcontainers uses the Docker socket — available on ubuntu-latest
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./test-results/*.trx

  # ── TODO: E2E Tests ──────────────────────────────────────────────────────────
  # E2E tests spin up both services with shared Testcontainers (Postgres ×2,
  # RabbitMQ, Redis) and verify the full Entries → Outbox → Consolidated flow.
  # Separated from integration tests because they require Docker-in-Docker and
  # take ~30 s per run (Testcontainers startup + 5 s Outbox polling window).
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Run E2E tests
        run: |
          dotnet test tests/CashFlow.E2E.Tests/CashFlow.E2E.Tests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=e2e-results.trx" \
            --results-directory ./test-results
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: ./test-results/*.trx
